type Mutation {
  """Accept (confirm) a pending online booking."""
  acceptVenueBooking(input: AcceptVenueBookingInput!): BookingModel!

  """
  Set the new account’s password, mark the invitation accepted, and return an access token so the user is signed in immediately.
  """
  acceptVenueInvitation(input: AcceptVenueInvitationInput!): AuthPayload!

  """Approve a pending organizer-verification request."""
  adminApproveOrganizerVerification(input: ApproveOrganizerVerificationInput!): OrganizerVerificationRequestModel!
  adminApproveRefund(input: ApproveRefundInput!): AdminRefundRequest!
  adminApproveTournament(input: ApproveTournamentInput!): AdminTournament!
  adminApproveVenue(venueId: ID!): AdminVenue!

  """Approve a pending venue-verification request."""
  adminApproveVenueVerification(input: ApproveVenueVerificationInput!): VenueVerificationRequestModel!

  """Cancel a booking on the user’s behalf. A reason is required."""
  adminCancelBooking(input: CancelBookingByAdminInput!): AdminBooking!
  adminCancelTournament(input: CancelTournamentInput!): AdminTournament!

  """Append an admin note to a dispute."""
  adminCreateAdminNoteOnDispute(input: CreateAdminNoteOnDisputeInput!): AdminDispute!
  adminCreateSport(input: CreateSportInput!): AdminSport!

  """
  Get a presigned URL to upload an admin-managed asset (e.g. a sport icon) directly to S3.
  """
  adminCreateUploadUrl(input: CreateUploadUrlInput!): PresignedUpload!

  """
  Permanently remove a sport. Blocked when courts / tournaments / venue offerings still reference it — deactivate instead.
  """
  adminDeleteSport(id: ID!): Boolean!
  adminFeatureVenue(venueId: ID!): AdminVenue!

  """
  Create a venue invitation, send the email, and return the resulting row. In dev (stub mailer) the setup URL is returned so admins can click straight through.
  """
  adminInviteVenue(input: InviteVenueInput!): CreateInvitationResult!

  """Mark a paid / CONFIRMED booking as COMPLETED."""
  adminMarkBookingCompleted(input: MarkBookingCompletedInput!): AdminBooking!

  """
  After the bank-side refund clears: flips RefundRequest -> PROCESSED, Payment -> REFUNDED / PARTIALLY_REFUNDED, and freezes any unsettled Settlement.
  """
  adminMarkRefundProcessed(input: MarkRefundProcessedInput!): AdminRefundRequest!

  """
  Mark a payment’s settlement as PAID. Creates the Settlement row on first invocation, then flips it to PAID.
  """
  adminMarkSettlementPaid(input: MarkSettlementPaidInput!): AdminPayment!

  """Reinstate organizer access on a previously-suspended user."""
  adminReinstateOrganizerAccess(userId: ID!): AdminUser!

  """Reinstate venue access on a previously-suspended user."""
  adminReinstateVenueAccess(userId: ID!): AdminUser!

  """Reject a pending organizer-verification request with a reason."""
  adminRejectOrganizerVerification(input: RejectOrganizerVerificationInput!): OrganizerVerificationRequestModel!
  adminRejectRefund(input: RejectRefundInput!): AdminRefundRequest!
  adminRejectVenue(input: RejectVenueInput!): AdminVenue!

  """Reject a pending venue-verification request with a reason."""
  adminRejectVenueVerification(input: RejectVenueVerificationInput!): VenueVerificationRequestModel!

  """Rotate the token, push the expiry forward and resend the email."""
  adminResendVenueInvitation(input: ResendVenueInvitationInput!): CreateInvitationResult!

  """Delete a pending invitation so its link stops working."""
  adminRevokeVenueInvitation(input: RevokeVenueInvitationInput!): Boolean!

  """Suspend organizer access on a user (organizerStatus -> SUSPENDED)."""
  adminSuspendOrganizerAccess(userId: ID!): AdminUser!
  adminSuspendTournament(input: SuspendTournamentInput!): AdminTournament!

  """Suspend a user (sets isActive=false)."""
  adminSuspendUser(id: ID!): AdminUser!
  adminSuspendVenue(input: SuspendVenueInput!): AdminVenue!

  """Suspend venue access on a user (venueStatus -> SUSPENDED)."""
  adminSuspendVenueAccess(userId: ID!): AdminUser!
  adminUnfeatureVenue(venueId: ID!): AdminVenue!

  """Reactivate a previously suspended user (sets isActive=true)."""
  adminUnsuspendUser(id: ID!): AdminUser!

  """
  Transition a dispute. RESOLVED requires a resolution; closed disputes (RESOLVED / REJECTED) cannot be reopened.
  """
  adminUpdateDisputeStatus(input: UpdateDisputeStatusInput!): AdminDispute!

  """
  Partially update platform settings. Only fields present in the input are touched.
  """
  adminUpdatePlatformSettings(input: UpdatePlatformSettingsInput!): PlatformSettings!
  adminUpdateSport(input: UpdateSportInput!): AdminSport!

  """
  Generic status setter. Requires a reason when moving to SUSPENDED / CANCELLED.
  """
  adminUpdateTournamentStatus(input: UpdateTournamentStatusInput!): AdminTournament!
  adminUpdateTournamentVisibility(input: UpdateTournamentVisibilityInput!): AdminTournament!

  """Update a user’s platform role (USER / SUPER_ADMIN)."""
  adminUpdateUserRole(input: UpdateUserRoleInput!): AdminUser!

  """Generic verification-status setter; useful for bulk-status flows."""
  adminUpdateVenueVerificationStatus(input: UpdateVenueVerificationStatusInput!): AdminVenue!

  """
  Cancel one of your own bookings (only before it reaches a terminal state).
  """
  cancelMyBooking(input: CancelMyBookingInput!): PlayerBookingModel!

  """
  Complete a booking with add-on extras and final payment (writes a status event).
  """
  completeVenueBooking(input: CompleteVenueBookingInput!): BookingModel!

  """Book a court slot as a player. Starts PENDING until the venue accepts."""
  createBooking(input: CreateBookingInput!): PlayerBookingModel!

  """Block a court or the whole venue for a time window."""
  createClosure(input: CreateClosureInput!): ClosureModel!

  """Create a membership plan."""
  createMembershipPlan(input: CreateMembershipPlanInput!): MembershipPlanModel!

  """Create a venue offer / promo code."""
  createOffer(input: CreateOfferInput!): OfferModel!

  """Subscribe a customer to a plan (records the first payment)."""
  createSubscription(input: CreateSubscriptionInput!): SubscriptionModel!

  """
  Get a presigned URL to upload one file (avatar, venue image/document, etc.) directly to S3.
  """
  createUploadUrl(input: CreateUploadUrlInput!): PresignedUpload!

  """Create a walk-in / manual booking from the venue panel."""
  createVenueBooking(input: CreateVenueBookingInput!): BookingModel!

  """Create (or reuse, by phone) a venue customer."""
  createVenueCustomer(input: CreateVenueCustomerInput!): VenueCustomerModel!

  """Decline (cancel) a pending online booking."""
  declineVenueBooking(input: DeclineVenueBookingInput!): BookingModel!

  """Remove a closure / time block."""
  deleteClosure(closureId: ID!, venueId: ID!): ClosureModel!

  """Delete a membership plan."""
  deleteMembershipPlan(planId: ID!, venueId: ID!): MembershipPlanModel!

  """Delete a venue offer."""
  deleteVenueOffer(offerId: ID!, venueId: ID!): OfferModel!

  """
  Email + password login. Used by admin / venue-management web panels. Mobile users use OTP.
  """
  loginWithEmail(input: LoginWithEmailInput!): AuthPayload!

  """
  Phone + password login (mobile). Only works after the phone has been verified via OTP once.
  """
  loginWithPhone(input: LoginWithPhoneInput!): AuthPayload!

  """Update a booking’s payment state (paid / pending / partial)."""
  recordVenueBookingPayment(input: RecordBookingPaymentInput!): BookingModel!

  """Renew a subscription (extends the window + records a payment)."""
  renewSubscription(input: RenewSubscriptionInput!): SubscriptionModel!

  """Send an OTP and ensure the ORGANIZER role for this phone."""
  requestOrganizerOtp(input: RequestOtpInput!): OtpRequestResult!

  """
  Send an OTP and ensure the PLAYER role for this phone (granted instantly).
  """
  requestPlayerOtp(input: RequestOtpInput!): OtpRequestResult!

  """Send an OTP and ensure the VENUE (owner) role for this phone."""
  requestVenueOtp(input: RequestOtpInput!): OtpRequestResult!

  """Pause, resume, cancel or expire a subscription."""
  setSubscriptionStatus(input: SetSubscriptionStatusInput!): SubscriptionModel!

  """
  Check in / complete / no-show / cancel a booking (writes a status event).
  """
  setVenueBookingStatus(input: SetBookingStatusInput!): BookingModel!

  """
  Replace the venue's sports + courts. Requires the venue:edit permission.
  """
  setVenueServices(input: SetVenueServicesInput!): VenueModel!

  """
  Sign the caller out by bumping their tokenVersion. Every previously-issued access token is rejected on the next request.
  """
  signOut: Boolean!

  """
  Add a venue from the dashboard. Creates the venue as PENDING (a super admin must approve the listing before it goes live) + an OWNER membership + its courts/sports. Requires ≥1 sport with ≥1 court. The VENUE capability is granted at signup and untouched here.
  """
  submitVenue(input: SubmitVenueInput!): VenueModel!

  """Update / activate / deactivate a membership plan."""
  updateMembershipPlan(input: UpdateMembershipPlanInput!): MembershipPlanModel!

  """Update / activate / deactivate an offer."""
  updateOffer(input: UpdateOfferInput!): OfferModel!

  """Update the current user profile (name / email / avatar)."""
  updateProfile(input: UpdateProfileInput!): User!

  """
  Edit a pending booking — reschedule (court/time/duration) and/or its customer.
  """
  updateVenueBooking(input: UpdateVenueBookingInput!): BookingModel!

  """
  Update editable venue profile fields. Requires the venue:edit permission.
  """
  updateVenueProfile(input: UpdateVenueProfileInput!): VenueModel!

  """Verify an OTP and return an access token."""
  verifyOtp(input: VerifyOtpInput!): AuthPayload!
}

