  """All offers for a venue (management view), paginated."""
  venueOffers(input: ListVenueOffersInput!): PaginatedOffers!

  """A single subscription with its payment history."""
  venueSubscription(subscriptionId: ID!, venueId: ID!): SubscriptionModel!

  """
  A venue's subscriptions (excludes CANCELLED unless filtered), paginated.
  """
  venueSubscriptions(input: ListSubscriptionsInput!): PaginatedSubscriptions!

  """Browse approved venues (player marketplace), filtered + paginated."""
  venues(input: BrowseVenuesInput!): PaginatedVenues!

  """Validate the token before showing the password-setup form."""
  verifyVenueInvitation(token: String!): InvitationVerification!
}

