  venueLoyaltyStatus(input: LoyaltyStatusInput!): LoyaltyStatusModel!

  """A venue's membership plans."""
  venueMembershipPlans(input: ListMembershipPlansInput!): [MembershipPlanModel!]!

  """Venue membership KPIs (active, expiring, revenue, renewal rate)."""
