  CASH
  ESEWA
  FONEPAY
  IMEPAY
  KHALTI
  MANUAL
  STRIPE
}

"""
Payment state across providers. REFUNDED / PARTIALLY_REFUNDED feed into the refunds module.
"""
enum PaymentStatus {
  FAILED
  PARTIALLY_REFUNDED
  PENDING
  REFUNDED
  SUCCEEDED
}

