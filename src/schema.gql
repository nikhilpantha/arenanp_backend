  updatedBy: AdminUser
}

type PopularCityItem {
  bookings: Int!
  city: String!
}

type PopularSportItem {
  bookings: Int!
  sport: String!
}

type Query {
  """
  Full detail for a single booking — user, venue, court, payment and timeline.
  """
  adminBookingDetail(id: ID!): AdminBooking!

  """
  Aggregated KPIs, trends and recent activity for the super-admin dashboard.
  """
  adminDashboardOverview: AdminDashboardOverview!

  """Single dispute with booking context + the full admin-notes thread."""
  adminDisputeDetail(id: ID!): AdminDispute!

  """
  List bookings with date / venue / sport / status / payment-provider filters.
  """
  adminListBookings(input: ListAdminBookingsInput): PaginatedAdminBookings!

  """List customer disputes with status / category / search filters."""
  adminListDisputes(input: ListAdminDisputesInput): PaginatedAdminDisputes!

  """
  List organizer-verification submissions with optional status / search filters.
  """
  adminListOrganizerVerificationRequests(input: ListOrganizerVerificationRequestsInput): PaginatedOrganizerVerificationRequests!

  """List payments with provider / status / settlement / date filters."""
  adminListPayments(input: ListAdminPaymentsInput): PaginatedAdminPayments!

  """List refund requests with optional status / search filters."""
  adminListRefundRequests(input: ListAdminRefundsInput): PaginatedAdminRefunds!

  """
  Catalogue of sports. Pass `activeOnly: true` to filter to the ones currently bookable.
  """
  adminListSports(activeOnly: Boolean! = false): [AdminSport!]!

  """
  List tournaments with sport / status / visibility / city / date filters.
  """
  adminListTournaments(input: ListAdminTournamentsInput): PaginatedAdminTournaments!

  """List platform users with pagination, search and filters."""
  adminListUsers(input: ListAdminUsersInput): PaginatedAdminUsers!

  """List pending (un-accepted) venue-owner invitations."""
  adminListVenueOwnerInvitations: [VenueOwnerInvitation!]!

  """
  List venue-owner-verification submissions with optional status / search filters.
  """
  adminListVenueOwnerVerificationRequests(input: ListVenueOwnerVerificationRequestsInput): PaginatedVenueOwnerVerificationRequests!

  """
  List venues with pagination, search, and city / sport / status / featured filters.
  """
  adminListVenues(input: ListAdminVenuesInput): PaginatedAdminVenues!

  """
  Single organizer-verification submission with submitted info + reviewer.
  """
  adminOrganizerVerificationRequest(id: ID!): OrganizerVerificationRequestModel!

  """Single payment with commission breakdown and settlement info."""
  adminPaymentDetail(id: ID!): AdminPayment!

  """
  Aggregated totals (gross / commission / venue-owed / venue-settled / refunded) for the filter set.
  """
  adminPaymentsOverview(input: ListAdminPaymentsInput): PaymentsOverview!

  """
  Read the singleton platform settings row. Created on first access if missing.
  """
  adminPlatformSettings: PlatformSettings!

  """Single refund request — full booking + payment context."""
  adminRefundRequestDetail(id: ID!): AdminRefundRequest!

  """
  Returns every payment matching the filter set as a flat CSV-ready array. The frontend serialises to CSV.
  """
  adminSettlementsExport(input: ListAdminPaymentsInput): [SettlementExportRow!]!
  adminSport(id: ID!): AdminSport!

  """
  Full tournament detail — organizer, registrations, matches, and the payment summary.
  """
  adminTournamentDetail(id: ID!): AdminTournament!

  """Full detail payload for a single user."""
  adminUserDetail(id: ID!): AdminUserDetail!

  """Single venue with owner, courts, gallery and review trail."""
  adminVenueDetail(id: ID!): AdminVenue!

  """
  Single venue-owner-verification submission with submitted info + reviewer.
  """
  adminVenueOwnerVerificationRequest(id: ID!): VenueOwnerVerificationRequestModel!

  """Returns the currently authenticated user."""
  me: User!

  """Validate the token before showing the password-setup form."""
  verifyVenueOwnerInvitation(token: String!): InvitationVerification!
}

