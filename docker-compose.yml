services:
  postgres:
    image: postgres:16-alpine
    container_name: arenanp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: arenanp
      POSTGRES_PASSWORD: arenanp
      POSTGRES_DB: arenanp
      TZ: Asia/Kathmandu
    ports:
      # Host 5433 → container 5432, to avoid clashing with a host Postgres on 5432.
      - '5433:5432'
    volumes:
      - arenanp-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U arenanp -d arenanp']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: arenanp-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - arenanp-redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  arenanp-postgres-data:
  arenanp-redis-data:
