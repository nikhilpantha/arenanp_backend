name: Deploy to production

on:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check & build
        run: npm run build

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd ~/arenanp_backend
            echo "🔄 Pulling latest code..."
            git pull origin main
            echo "📦 Installing dependencies..."
            npm ci
            echo "🔧 Generating Prisma client..."
            npx prisma generate
            echo "🏗️ Building application..."
            npm run build
            echo "🗄️ Running migrations..."
            npx prisma migrate deploy
            echo "🚀 Restarting application..."
            pm2 restart arenanp-api --update-env
            echo "⏳ Waiting for startup..."
            sleep 8
            echo "✅ Verifying deployment..."
            # Check if process is running
            if pm2 list | grep -q "arenanp-api.*online"; then
              echo "✅ Backend process is online"
              # Verify API is responding
              if curl -sf http://localhost:4000/graphql -H 'content-type: application/json' -d '{"query":"{ __typename }"}' > /dev/null; then
                echo "✅ API is responding correctly"
                echo "✅ Deployment successful!"
              else
                echo "⚠️ Process is online but API not responding yet. Waiting..."
                sleep 5
                if curl -sf http://localhost:4000/graphql -H 'content-type: application/json' -d '{"query":"{ __typename }"}' > /dev/null; then
                  echo "✅ API is now responding"
                  echo "✅ Deployment successful!"
                else
                  echo "❌ API still not responding after retry"
                  exit 1
                fi
              fi
            else
              echo "❌ Application failed to start"
              pm2 logs arenanp-api --lines 50
              exit 1
            fi
