name: Deploy to production

on:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check & build
        run: npm run build

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd ~/arenanp_backend
            echo "🔄 Pulling latest code..."
            git pull origin main
            echo "📦 Installing dependencies..."
            npm ci
            echo "🔧 Generating Prisma client..."
            npx prisma generate
            echo "🏗️ Building application..."
            npm run build
            echo "🗄️ Running migrations..."
            npx prisma migrate deploy
            echo "🚀 Restarting application..."
            pm2 restart arenanp-api --update-env
            echo "⏳ Waiting for startup..."
            sleep 5
            echo "✅ Checking application status..."
            STATUS=$(pm2 show arenanp-api | grep status | awk '{print $NF}')
            if [ "$STATUS" = "online" ]; then
              echo "✅ Backend deployed successfully!"
              curl -s http://localhost:4000/graphql -H 'content-type: application/json' -d '{"query":"{ __typename }"}' && echo "✅ API is responding"
            else
              echo "❌ Application failed to start. Status: $STATUS"
              pm2 logs arenanp-api --lines 30
              exit 1
            fi
